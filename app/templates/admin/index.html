{% extends "admin/base.html" %}
{% block title %}Übersicht{% endblock %}
{% block content %}
<h1>Übersicht</h1>

<div class="stats">
  <div class="stat">
    <div class="value">€{{ "%.2f"|format(total_revenue) }}</div>
    <div class="label">Gesamtumsatz</div>
  </div>
<div class="stat">
    <div class="value">{{ transaction_count }}</div>
    <div class="label">Buchungen</div>
  </div>
</div>

<div class="card">
  <h2 style="margin-bottom:1rem">Schnellaktionen</h2>
  <form action="{{ url_for('admin.sync_now') }}" method="post" style="display:inline">
    <button class="btn btn-secondary">Jetzt synchronisieren</button>
  </form>
</div>
{% endblock %}
